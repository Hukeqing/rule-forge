on:
  push:
    tags:
      - "v*.*.*"

name: Build Rules

permissions:
  contents: write

jobs:
  generate_and_upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python3
        run: |
          sudo apt update
          sudo apt install -y python3

      - name: Generate configs
        env:
          TARGETS: clash loon
        run: |
          mkdir -p output
          for target in $TARGETS; do
            echo "Generating $target..."
            python3 scripts/generate_${target}.py -o output/${target}
          done

      - name: Release yaml
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: output/**
